<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="No search results">
  <circle cx="120" cy="120" r="100" fill="#1A3C8F" fill-opacity="0.08"/>
  <!-- Magnifier lens -->
  <circle cx="108" cy="108" r="44" fill="#FFFFFF" stroke="#1A3C8F" stroke-width="8"/>
  <!-- Lens highlight -->
  <path d="M82 92 Q 92 80 110 80" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Handle -->
  <rect x="148" y="148" width="40" height="14" rx="7" transform="rotate(45 148 148)" fill="#1A3C8F"/>
  <!-- Empty question marks inside lens -->
  <text x="108" y="124" text-anchor="middle" font-family="Poppins, sans-serif" font-size="46" font-weight="700" fill="#1A3C8F" fill-opacity="0.35">?</text>
  <!-- Accent dots -->
  <circle cx="50" cy="180" r="5" fill="#00C9A7"/>
  <circle cx="194" cy="62" r="4" fill="#F5A623"/>
  <circle cx="60" cy="58" r="3" fill="#1A3C8F" fill-opacity="0.4"/>
</svg>
