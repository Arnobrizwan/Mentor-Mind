name: mentor_minds
description: AI-Powered Tutoring Platform for O/A Level Students in Bangladesh.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.2.7

  # Animations
  flutter_animate: ^4.5.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  google_sign_in: ^6.2.1
  firebase_app_check: ^0.3.2+9
  cloud_functions: ^5.6.2

  # UI
  flutter_markdown: ^0.7.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  uuid: ^4.5.3

  # Utils
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.0.5
  intl: ^0.19.0

  # image attach
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  fl_chart: ^0.69.0
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Lints (Phase 1 / D-08, QUAL-04)
  # custom_lint 0.7.7 was specified in PLAN but does not exist on pub.dev;
  # latest in ^0.7.x is 0.7.6 (next: 0.8.1 which bumps analyzer major).
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  mentormind_lints:
    path: tool/lints

  # Test harness (Phase 1 / CI-07)
  mocktail: ^1.0.5
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.2
  golden_toolkit: ^0.15.0
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/illustrations/
