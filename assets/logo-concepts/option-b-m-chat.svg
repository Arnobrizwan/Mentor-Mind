  <!-- Chat bubble tail -->
  <path d="M165 175 L160 192 L150 178 Z" fill="#00C9A7"/>
  <!-- Typing indicator dots -->
  <circle cx="148" cy="150" r="3.5" fill="#F5A623"/>
  <circle cx="162" cy="150" r="3.5" fill="#F5A623"/>
  <circle cx="176" cy="150" r="3.5" fill="#F5A623"/>
</svg>
